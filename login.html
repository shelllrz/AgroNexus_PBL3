<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgroNexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<section class="login-page">
    <section class="login-left">
        <div class="login-text">
            <img src="./img/logo-agronexus.png.png" alt="Logo AgroNexus" class="logo-img mb-4">
            <h2>
                Conectamos quem
                <span>produz com quem valoriza.</span>
            </h2>

            <p>
                Tecnologia, rastreabilidade e inteligência
                para uma agricultura mais justa.
            </p>
        </div>
    </section>

    <section class="login-right">
        <div class="login-card">
            <h2>Acessar sua conta</h2>
            <p class="texto-cinza">
                Digite qualquer usuário e senha
                para acessar o protótipo.
            </p>

            <form action="dashboard.html">
                <label>E-mail ou CPF</label>

                <input type="text" class="form-control input-agro" placeholder="Digite qualquer usuário">
                <label>Senha</label>
                <input type="password" class="form-control input-agro" placeholder="Digite qualquer senha">

                <button type="submit" class="btn btn-success w-100 mt-4">Entrar na Plataforma</button>
            </form>
        </div>
    </section>
</section>
</body>
</html>
