<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | AgroNexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <img src="img/logo-agronexus.png" alt="Logo AgroNexus" class="logo-img sidebar-logo">

        <a href="index.html">Início</a>
        <a href="dashboard.html">Painel do Usuário</a>
        <a href="rastreabilidade.html">Rastreabilidade</a>
        <a href="contato.html" class="active">Fale Conosco</a>
    </aside>

    <main class="content">
        <h1>Fale Conosco</h1>

        <p class="texto-cinza">
            Entre em contato com a equipe AgroNexus
        </p>

        <div class="row mt-4">
            <div class="col-md-8">
                <form class="card-agro">
                    <label>Nome</label>
                    <input type="text" required class="form-control input-agro">
                    <label>E-mail</label>
                    <input type="email" required class="form-control input-agro">
                    <label>Telefone</label>
                    <input type="tel" required class="form-control input-agro">
                    <label>Mensagem</label>
                    <textarea rows="5" required class="form-control input-agro"></textarea>
                    <button type="submit" class="btn btn-success mt-4">Enviar Mensagem</button>
                </form>
            </div>

            <div class="col-md-4">
                <div class="card-agro">
                    <h3>Outros Canais</h3>
                    <p>WhatsApp</p>
                    <p>Suporte 24h</p>
                    <p>contato@agronexus.com</p>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
